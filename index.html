<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMS MOD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d5c3f;
padding:25px;
}

.container{
max-width:420px;
margin:auto;
background:#fff;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo{
font-size:40px;
font-weight:700;
color:#0d5c3f;
text-align:center;
}

.subtitle{
text-align:center;
font-size:28px;
font-weight:700;
margin-top:10px;
margin-bottom:20px;
}

.plan{
border:3px solid #0d5c3f;
border-radius:18px;
padding:18px;
margin-bottom:18px;
text-align:center;
}

.plan h2{
font-size:34px;
font-weight:700;
}

.price{
font-size:32px;
font-weight:600;
margin:10px 0;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#0d5c3f;
color:#fff;
font-size:24px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0b4f35;
}

.footer{
text-align:center;
margin-top:15px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
NMS MOD
</div>

<div class="subtitle">
Select Subscription
</div>

<div class="plan">
<h2>7 Days</h2>
<div class="price">₹1566</div>

<button id="plan7">
Subscribe
</button>
</div>

<div class="plan">
<h2>15 Days</h2>
<div class="price">₹3690</div>

<button id="plan15">
Subscribe
</button>
</div>

<div class="plan">
<h2>Monthly</h2>
<div class="price">₹4790</div>

<button id="plan30">
Subscribe
</button>
</div>

<div class="footer">
Secure Payments Powered by Razorpay
</div>

<script src="script.js"></script>

</body>
</html>
